<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f0f4f8;
            color: #333;
            padding: 24px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            color: #0077b6;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #0077b6;
        }

        .card p {
            font-size: 14px;
            margin-bottom: 6px;
            color: #555;
        }

        .card span {
            font-weight: bold;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #999;
            margin-top: 48px;
        }
    </style>
</head>

<body>
    <h1>🌊 Wave Alert</h1>
    <div class="cards" id="cards">
        <p class="loading">Carregando...</p>
    </div>

    <script>
        async function loadWaves() {
            const res = await fetch('/api/waves');
            const data = await res.json();
            const container = document.getElementById('cards');
            container.innerHTML = '';

            data.forEach(beach => {
                container.innerHTML += `
          <div class="card">
            <h2>📍 ${beach.name}</h2>
            <p>Altura: <span>${beach.waveHeight}m</span></p>
            <p>Período: <span>${beach.wavePeriod}s</span></p>
            <p>Direção: <span>${beach.waveDirection}°</span></p>
          </div>
        `;
            });
        }

        loadWaves();
    </script>
</body>

</html>
